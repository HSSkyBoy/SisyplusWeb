<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西西弗斯验证码</title>
    <style>
        :root {
            --blue-primary: #4A90E2;
            --bg-gray: #f9f9f9;
        }

        body {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            background-color: #e9e9e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 验证码外框 */
        .captcha-container {
            width: 350px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            user-select: none;
            position: relative;
        }

        /* 蓝色头部 */
        .header {
            background-color: var(--blue-primary);
            color: white;
            padding: 24px;
        }

        .header .title-small { font-size: 14px; margin-bottom: 4px; opacity: 0.9; }
        .header .title-large { font-size: 24px; font-weight: bold; line-height: 1.2; }

        /* 游戏内容区 */
        .game-area {
            height: 300px; /* 保持高度 */
            background-image: url('Background.png'); /* 基于 image_0.png 的坡面 */
            background-size: cover;
            background-position: bottom left;
            position: relative;
            overflow: hidden;
        }

        /* 石头 */
        #stone {
            width: 50px; /* 尺寸参考 image_1.png */
            height: 50px;
            position: absolute;
            background-image: url('Stone.png'); /* image_1.png */
            background-size: contain;
            background-repeat: no-repeat;
            transform-origin: center center;
            bottom: 10px; /* 起始位置 */
            left: -60px; /* 起始位置在西西弗斯前面，屏幕外 */
        }

        /* 西西弗斯 */
        #sisyphus {
            width: 30px; /* 尺寸参考 image_2.png */
            height: 60px;
            position: absolute;
            background-image: url('Sisyphus.png'); /* image_2.png */
            background-size: contain;
            background-repeat: no-repeat;
            bottom: 10px; /* 起始位置 */
            left: 10px; /* 起始位置 */
        }

        /* 底部滑块容器 */
        .slider-container {
            height: 40px;
            background-color: #f0f0f0;
            border-top: 1px solid #eee;
            position: relative;
        }

        /* 滑块轨道 */
        .slider-track {
            position: absolute;
            top: 50%;
            left: 10px;
            right: 10px;
            height: 10px;
            background-color: #d0d0d0;
            transform: translateY(-50%);
            border-radius: 5px;
        }

        /* 滑块把手 */
        .slider-handle {
            width: 40px;
            height: 40px;
            background-color: var(--blue-primary);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: -20px; /* 初始位置 */
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        .slider-handle.dragging {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* 底部工具栏 */
        .footer {
            border-top: 1px solid #eee;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icons { display: flex; gap: 15px; color: #777; font-size: 20px; }
        .icons span { cursor: pointer; }

        .verify-btn {
            background-color: var(--blue-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 结算弹窗 */
        #status-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="header">
        <div class="title-small">拖动滑块，推石上山</div>
        <div class="title-large">西西弗斯验证码</div>
        <div class="title-small" style="margin-top:10px;">日复一日，永无止境</div>
    </div>

    <div class="game-area">
        <div id="sisyphus"></div>
        <div id="stone"></div>
    </div>

    <div class="slider-container">
        <div class="slider-track"></div>
        <div class="slider-handle" id="slider-handle"></div>
    </div>

    <div class="footer">
        <div class="icons">
            <span onclick="initGame()">🔄</span>
            <span>🎧</span>
            <span>ⓘ</span>
        </div>
        <button class="verify-btn" onclick="verify()">验证</button>
    </div>
</div>

<div id="status-overlay">
    <h2 id="result-title">验证失败</h2>
    <p id="result-desc"></p>
    <button onclick="closeOverlay()" style="padding: 10px 20px; margin-top: 20px;">再次尝试</button>
</div>

<script>
const state = {
    dragging: false,
    value: 0, // 0~100
    velocity: 0,
    raf: null
};

const el = {
    container: document.querySelector('.captcha-container'),
    game: document.querySelector('.game-area'),
    stone: document.getElementById('stone'),
    sisyphus: document.getElementById('sisyphus'),
    handle: document.getElementById('slider-handle'),
    overlay: document.getElementById('status-overlay')
};

const config = {
    slopeFactor: 0.5,
    rollbackSpeed: 0.5,
    fastRollbackSpeed: 2,
    successThreshold: 95
};

let layout = {};

/* ---------- 初始化 ---------- */
function measure() {
    layout = {
        width: el.container.offsetWidth,
        gameW: el.game.offsetWidth,
        gameH: el.game.offsetHeight,
        sliderMax: el.container.offsetWidth - 40
    };
}

function initGame() {
    state.value = 0;
    state.velocity = 0;
    state.dragging = false;
    cancelAnimationFrame(state.raf);
    render();
    closeOverlay();
}

window.addEventListener('resize', measure);
measure();

/* ---------- 渲染 ---------- */
function render() {
    const v = state.value;

    // slider
    const x = (v / 100) * layout.sliderMax;
    el.handle.style.left = x + 'px';

    // sisyphus
    const sx = 10 + (v / 100) * (layout.gameW - 50);
    const sy = 10 + (v / 40) * (layout.gameH - 50) * config.slopeFactor;

    el.sisyphus.style.left = sx + 'px';
    el.sisyphus.style.bottom = sy + 'px';

    // stone
    const stoneX = sx + 15;
    const stoneY = sy + 40;

    el.stone.style.left = stoneX + 'px';
    el.stone.style.bottom = stoneY + 'px';
    el.stone.style.transform = `rotate(${v * 10.8}deg)`;
}

/* ---------- 物理（溜車） ---------- */
function updatePhysics() {
    if (state.dragging) return;

    if (state.value > config.successThreshold) {
        if (Math.random() < 0.9) {
            state.value -= config.fastRollbackSpeed;
        } else {
            return; // 停在頂部
        }
    } else if (state.value > 0) {
        state.value -= config.rollbackSpeed;
    }

    state.value = Math.max(0, state.value);
}

/* ---------- 主循環 ---------- */
function loop() {
    updatePhysics();
    render();
    state.raf = requestAnimationFrame(loop);
}

/* ---------- 拖拽（Pointer Events） ---------- */
let lastX = 0;

el.handle.addEventListener('pointerdown', e => {
    state.dragging = true;
    lastX = e.clientX;
    el.handle.setPointerCapture(e.pointerId);
});

el.handle.addEventListener('pointermove', e => {
    if (!state.dragging) return;

    const dx = e.clientX - lastX;
    lastX = e.clientX;

    state.value += (dx / layout.sliderMax) * 100;
    state.value = Math.max(0, Math.min(100, state.value));
});

el.handle.addEventListener('pointerup', () => {
    state.dragging = false;
});

/* ---------- 驗證 ---------- */
function verify() {
    if (state.value > config.successThreshold && !state.dragging) {
        window.location.href = "https://www.bilibili.com/video/BV12SoeYdEH8/";
    } else {
        showResult("检测到非西西弗斯行为",
            "你甚至不是一个合格的西西弗斯。");
    }
}

/* ---------- UI ---------- */
function showResult(title, desc) {
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-desc').innerText = desc;
    el.overlay.style.display = 'flex';
}

function closeOverlay() {
    el.overlay.style.display = 'none';
}

/* ---------- 啟動 ---------- */
initGame();
loop();
</script>

</body>
</html>
